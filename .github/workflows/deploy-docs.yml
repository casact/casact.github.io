name: Build and deploy site

on:
  push:
    branches: [main]
  schedule:
    - cron: "0 5 * * *" # refresh repo listings
    - cron: "0 6 * * *" # refresh metrics
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  update-repos:
    if: >
      github.event_name == 'push' ||
      github.event_name == 'workflow_dispatch' ||
      github.event.schedule == '0 5 * * *'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install ".[repos]"

      - name: Generate repo listings
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python scripts/generate_repo_listings.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/index.md docs/projects.md
          if ! git diff --cached --quiet; then
            git commit -m "Update repo listings"
            git push
          fi

  update-metrics:
    needs: update-repos
    if: >
      always() && needs.update-repos.result != 'failure' && (github.event_name == 'push' ||
      github.event_name == 'workflow_dispatch' || github.event.schedule == '0 6 * * *')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install ".[metrics]"

      - name: Generate metrics
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python scripts/generate_metrics.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/index.md docs/projects.md docs/_static/images/metrics
          if ! git diff --cached --quiet; then
            git commit -m "Update GitHub metrics"
            git push
          fi

  build:
    needs: [update-repos, update-metrics]
    if: >
      always() && needs.update-repos.result != 'failure' &&
      needs.update-metrics.result != 'failure'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install .

      - name: Build Sphinx site
        run: sphinx-build -b html docs _build/html

      - name: Disable Jekyll processing
        run: touch _build/html/.nojekyll

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _build/html

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
